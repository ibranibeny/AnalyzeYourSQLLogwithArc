title: "Analyze Your SQL Logs with Arc & AI"
description: "Workshop — AI-Powered SQL Server Log Analysis with Azure Monitor, GPT-4o & Microsoft Learn MCP"
baseurl: "/AnalyzeYourSQLLogwithArc"
url: "https://ibranibeny.github.io"

remote_theme: just-the-docs/just-the-docs@v0.10.0

color_scheme: light
search_enabled: true
search.button: true

heading_anchors: true
permalink: pretty

aux_links:
  "GitHub Repo":
    - "https://github.com/ibranibeny/AnalyzeYourSQLLogwithArc"

aux_links_new_tab: true

nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "Back to top"

footer_content: "SQL Log Analysis Workshop &mdash; Income Insurance SG"

exclude:
  - scripts/
  - streamlit-app/
  - "*.sh"
  - "*.sql"
  - requirements.txt
  - Gemfile.lock

mermaid:
  version: "11"

callouts:
  warning:
    title: Warning
    color: red
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  important:
    title: Important
    color: yellow
